<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MLX TTS Studio icon</title>
  <desc id="desc">A dark rounded-square app icon with an orange speech waveform and MLX-style signal mark.</desc>
  <defs>
    <linearGradient id="shell" x1="64" y1="40" x2="448" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#272a31"/>
      <stop offset="0.58" stop-color="#16181d"/>
      <stop offset="1" stop-color="#0c0d10"/>
    </linearGradient>
    <linearGradient id="wave" x1="116" y1="190" x2="396" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="0.52" stop-color="#ffb23f"/>
      <stop offset="1" stop-color="#2ad4c7"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#08090c"/>
  <rect x="42" y="42" width="428" height="428" rx="96" fill="url(#shell)" filter="url(#soft-shadow)"/>
  <rect x="58" y="58" width="396" height="396" rx="84" fill="none" stroke="#343943" stroke-width="8"/>

  <g fill="url(#wave)">
    <rect x="116" y="229" width="24" height="54" rx="12"/>
    <rect x="154" y="204" width="24" height="104" rx="12"/>
    <rect x="192" y="176" width="24" height="160" rx="12"/>
    <rect x="230" y="146" width="24" height="220" rx="12"/>
    <rect x="268" y="176" width="24" height="160" rx="12"/>
    <rect x="306" y="204" width="24" height="104" rx="12"/>
    <rect x="344" y="229" width="24" height="54" rx="12"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="18">
    <path d="M118 354c48 42 228 42 276 0" stroke="#ffb23f" opacity="0.95"/>
    <path d="M150 384c42 24 170 24 212 0" stroke="#2ad4c7" opacity="0.8"/>
  </g>

  <g transform="translate(342 128)" fill="#dfe6ef">
    <circle cx="0" cy="0" r="10"/>
    <circle cx="34" cy="0" r="10" opacity="0.76"/>
    <circle cx="68" cy="0" r="10" opacity="0.52"/>
  </g>
</svg>
